# ==========================================
# 心镜·AIGC智能体平台 Docker Compose 部署
# ==========================================
# 第八届CCF开源创新大赛 · 任务三
# 国产算力平台适配版本
# ==========================================

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindmirror-backend
    ports:
      - "8000:8000"
    environment:
      # AI 算力平台配置（主平台：Lingshu-32B）
      - AI_PLATFORM=${AI_PLATFORM:-lingshu}
      - LINGSHU_API_KEY=${LINGSHU_API_KEY}
      - LINGSHU_BASE_URL=${LINGSHU_BASE_URL:-https://api.moark.com/v1}
      - LINGSHU_MODEL=${LINGSHU_MODEL:-Lingshu-32B}
      # 备用平台
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - AI_FALLBACK_PLATFORMS=${AI_FALLBACK_PLATFORMS:-deepseek}
      # 华为云OBS（可选）
      - OBS_AK=${OBS_AK}
      - OBS_SK=${OBS_SK}
      # 数据库
      - DATABASE_URL=sqlite:///./data/psych.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindmirror-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
